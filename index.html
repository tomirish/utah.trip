<!DOCTYPE html>
<!-- Source of truth: utah-trip.md — update both when itinerary changes -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utah Red Rock · June 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --rust:  #C4521A;
  --amber: #E07B39;
  --sand:  #F2DEC4;
  --clay:  #8B4A2B;
  --dusk:  #2C1810;
  --sage:  #7A8C6E;
  --cream: #FBF5ED;
  --light: #FBF0E4;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Jost', sans-serif;
  background: var(--cream);
  color: var(--dusk);
  overflow-x: hidden;
  max-width: 480px;
  margin: 0 auto;
}
img { display: block; width: 100%; }
a { color: inherit; text-decoration: none; }

/* ── HERO ── */
.hero {
  position: relative;
  height: 100svh;
  min-height: 600px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 0 48px;
  overflow: hidden;
}
.hero-slides { position: absolute; inset: 0; }
.hero-slide {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  animation: cf 15s infinite;
}
.hero-slide:nth-child(1) { animation-delay: 0s; }
.hero-slide:nth-child(2) { animation-delay: 5s; }
.hero-slide:nth-child(3) { animation-delay: 10s; }
@keyframes cf {
  0%   { opacity: 0; }
  6%   { opacity: 1; }
  33%  { opacity: 1; }
  40%  { opacity: 0; }
  100% { opacity: 0; }
}
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(44,24,16,0.1) 0%,
    rgba(44,24,16,0.2) 40%,
    rgba(44,24,16,0.85) 100%
  );
}
.hero-content {
  position: relative;
  z-index: 2;
  padding: 0 24px;
}
.hero-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 10px;
  opacity: 0;
  animation: fadeUp 0.8s 0.3s forwards;
}
.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(52px, 14vw, 80px);
  line-height: 0.95;
  color: var(--sand);
  margin-bottom: 12px;
  opacity: 0;
  animation: fadeUp 0.8s 0.5s forwards;
}
.hero-title em { color: var(--amber); font-style: italic; }
.hero-route {
  font-size: 12px;
  font-weight: 300;
  color: rgba(242,222,196,0.6);
  letter-spacing: 0.5px;
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeUp 0.8s 0.7s forwards;
}
.hero-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--rust);
  color: white;
  border-radius: 30px;
  font-size: 12px;
  font-weight: 600;
  opacity: 0;
  animation: fadeUp 0.8s 0.9s forwards;
}
.hero-scroll {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: rgba(242,222,196,0.4);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 1s 1.4s forwards;
}
.hero-scroll-line {
  width: 1px;
  height: 32px;
  background: linear-gradient(to bottom, transparent, rgba(242,222,196,0.4));
  animation: pulse 2s infinite;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

/* ── CHAPTERS ── */
.chapter { background: white; }
.chapter + .chapter { border-top: 3px solid var(--rust); }

.chapter-splash {
  position: relative;
  height: 260px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
}
.chapter-splash-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 30%, rgba(44,24,16,0.82));
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 20px;
}
.chapter-eyebrow {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 4px;
}
.chapter-title {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 900;
  color: white;
  line-height: 1.0;
}
.chapter-title em { color: var(--amber); font-style: italic; }
.chapter-hotel {
  font-size: 11px;
  color: rgba(242,222,196,0.6);
  margin-top: 5px;
}

/* ── MEDIA STRIP ── */
.media-strip-wrap { background: var(--light); padding: 12px 0 10px; }
.media-strip-hint {
  font-size: 10px;
  color: rgba(139,74,43,0.5);
  padding: 0 16px 6px;
  letter-spacing: 0.5px;
}
.media-strip {
  display: flex;
  gap: 8px;
  padding: 0 16px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.media-strip::-webkit-scrollbar { display: none; }
.media-thumb {
  flex-shrink: 0;
  width: 90px;
  height: 64px;
  border-radius: 10px;
  background-size: cover;
  background-position: center;
  box-shadow: 0 2px 8px rgba(44,24,16,0.15);
}
.media-thumb-video {
  flex-shrink: 0;
  width: 90px;
  height: 64px;
  border-radius: 10px;
  background-size: cover;
  background-position: center;
  box-shadow: 0 2px 8px rgba(44,24,16,0.15);
  position: relative;
  overflow: hidden;
  display: block;
  text-decoration: none;
}
.media-thumb-video::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}
.yt-play-badge {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  width: 28px;
  height: 28px;
  background: rgba(255,0,0,0.9);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.yt-play-badge::after {
  content: '';
  width: 0;
  height: 0;
  border-top: 7px solid transparent;
  border-bottom: 7px solid transparent;
  border-left: 11px solid white;
  margin-left: 2px;
}

/* ── ACCORDION ── */
.accordion { background: white; }
.acc-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 18px;
  border-bottom: 1px solid rgba(44,24,16,0.07);
  cursor: pointer;
  min-height: 44px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.acc-header:active { background: var(--light); }
.acc-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
.acc-header-text { flex: 1; }
.acc-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--dusk);
  line-height: 1.3;
}
.acc-sub {
  font-size: 11px;
  color: rgba(139,74,43,0.7);
  margin-top: 2px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.acc-time {
  font-size: 11px;
  font-weight: 700;
  color: var(--rust);
  white-space: nowrap;
  flex-shrink: 0;
}
.acc-chevron {
  font-size: 11px;
  color: rgba(139,74,43,0.35);
  flex-shrink: 0;
  transition: transform 0.25s;
}
.acc-header.open .acc-chevron { transform: rotate(180deg); }
.acc-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.acc-body-inner {
  padding: 12px 18px 16px 54px;
  background: #faf6f2;
  border-bottom: 1px solid rgba(44,24,16,0.07);
}
.acc-desc {
  font-size: 13px;
  font-weight: 300;
  color: var(--clay);
  line-height: 1.65;
  margin-bottom: 10px;
}
.acc-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.acc-tag {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
}
.acc-tag-dur  { background: rgba(139,74,43,0.1); color: var(--clay); }
.acc-tag-cost { background: rgba(196,82,26,0.1); color: var(--rust); }
.acc-tag-book { background: rgba(122,140,110,0.15); color: var(--sage); }
.acc-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 8px 16px;
  border-radius: 24px;
  font-size: 11px;
  font-weight: 600;
  background: var(--rust);
  color: white;
  text-decoration: none;
  transition: background 0.2s;
}
.acc-btn:active { background: var(--clay); }
.status-booked { color: #4caf50; }
.status-pending { color: var(--amber); }

/* ── ZION DAY SELECTOR ── */
.day-selector {
  display: flex;
  gap: 8px;
  padding: 14px 18px;
  background: var(--light);
  border-bottom: 1px solid rgba(44,24,16,0.07);
}
.day-pill {
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid rgba(196,82,26,0.25);
  color: var(--clay);
  background: white;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.day-pill.active {
  background: var(--rust);
  border-color: var(--rust);
  color: white;
}

/* ── FOOTER ── */
.site-footer {
  background: var(--dusk);
  padding: 40px 24px;
  text-align: center;
}
.footer-stats {
  display: flex;
  justify-content: center;
  gap: 0;
  flex-wrap: wrap;
  margin-bottom: 28px;
}
.footer-stat {
  padding: 0 20px;
  border-right: 1px solid rgba(242,222,196,0.15);
}
.footer-stat:last-child { border-right: none; }
.footer-stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--amber);
  display: block;
}
.footer-stat-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(242,222,196,0.4);
}
.footer-plan-link {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 20px;
  border: 1px solid rgba(242,222,196,0.2);
  border-radius: 24px;
  font-size: 11px;
  font-weight: 600;
  color: rgba(242,222,196,0.5);
  text-decoration: none;
  margin-bottom: 28px;
  transition: all 0.2s;
}
.footer-plan-link:active { border-color: var(--amber); color: var(--amber); }
.footer-credit {
  font-size: 10px;
  color: rgba(242,222,196,0.2);
  line-height: 1.7;
}

/* ── FADE-UP SCROLL ANIMATION ── */
.fade-up {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.fade-up.visible { opacity: 1; transform: none; }
</style>
</head>
<body>
  <!-- HERO -->
  <section class="hero">
    <div class="hero-slides">
      <div class="hero-slide" style="background-image:url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80')"></div>
      <div class="hero-slide" style="background-image:url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80')"></div>
      <div class="hero-slide" style="background-image:url('https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=800&q=80')"></div>
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-eyebrow">June 21 – 28, 2025</div>
      <h1 class="hero-title">Utah<br><em>Red Rock</em></h1>
      <p class="hero-route">Las Vegas → Cedar City → Bryce → Zion → St. George</p>
      <div class="hero-pill">💍 Wedding Jun 27 · St. George</div>
    </div>
    <div class="hero-scroll">
      <div class="hero-scroll-line"></div>
      scroll
    </div>
  </section>

<script>
// ── Accordion ──
function toggleAcc(header) {
  const body = header.nextElementSibling;
  const isOpen = header.classList.contains('open');
  // close siblings
  header.closest('.accordion').querySelectorAll('.acc-header.open').forEach(h => {
    h.classList.remove('open');
    h.nextElementSibling.style.maxHeight = null;
  });
  if (!isOpen) {
    header.classList.add('open');
    body.style.maxHeight = body.scrollHeight + 'px';
  }
}

// ── Zion day selector ──
function showZionDay(day, btn) {
  document.querySelectorAll('.zion-day').forEach(d => { d.style.display = 'none'; });
  document.getElementById('zion-day-' + day).style.display = 'block';
  document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
}

// ── Scroll fade-up ──
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
  });
}, { threshold: 0.08 });
document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
</script>
</body>
</html>
